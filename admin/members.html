<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EXRPLONES Admin | Members</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/admin.css" />
    <script defer src="../assets/js/members-store.js"></script>
    <script defer src="../assets/js/content-store.js"></script>
    <script defer src="../assets/js/admin.js"></script>
  </head>
  <body data-admin-page="members">
    <main class="admin-shell">
      <aside class="admin-sidebar card-surface">
        <div>
          <p class="eyebrow">EXRPLONES</p>
          <h2>Panel Admin</h2>
        </div>
        <nav class="admin-sidebar__nav">
          <a class="pressable" href="dashboard.html">Dashboard</a>
          <a class="pressable is-active" href="members.html">Members</a>
          <a class="pressable" href="projects.html">Projects</a>
          <a class="pressable" href="gallery.html">Gallery</a>
          <a class="pressable" href="events.html">Events</a>
          <a class="pressable" href="about.html">About</a>
          <a class="pressable" href="../index.html">Website</a>
        </nav>
        <button class="button button--ghost pressable" type="button" data-admin-logout>
          Logout
        </button>
      </aside>

      <section class="admin-content">
        <header class="admin-header">
          <div>
            <p class="eyebrow">Members Data</p>
            <h1>Kelola data anggota EXRPLONES.</h1>
          </div>
          <label class="admin-search">
            <span>Cari anggota</span>
            <input type="search" placeholder="Ketik nama atau username" data-admin-search />
          </label>
        </header>

        <div class="admin-members-layout">
          <section class="card-surface admin-panel">
            <div class="admin-panel__head">
              <div>
                <p class="eyebrow">Form Anggota</p>
                <h2>Tambah atau edit anggota.</h2>
              </div>
            </div>

            <form class="admin-form admin-form--members" data-admin-member-form>
              <input type="hidden" name="item_id" />
              <label class="admin-form__field admin-form__field--full">
                <span>Nama lengkap</span>
                <input type="text" name="name" placeholder="Nama anggota" required />
              </label>
              <label class="admin-form__field">
                <span>Username</span>
                <input type="text" name="username" placeholder="otomatis jika kosong" />
              </label>
              <label class="admin-form__field">
                <span>Role</span>
                <input type="text" name="role" placeholder="Anggota" value="Anggota" />
              </label>
              <label class="admin-form__field">
                <span>Instagram</span>
                <input type="text" name="instagram" placeholder="tanpa @" />
              </label>
              <label class="admin-form__field">
                <span>Lokasi</span>
                <input type="text" name="location" placeholder="opsional" />
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Foto</span>
                <input
                  type="text"
                  name="photo"
                  placeholder="assets/images/members/placeholder.svg"
                />
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Headline</span>
                <input type="text" name="headline" placeholder="Ringkasan singkat profil" />
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Bio</span>
                <textarea name="bio" rows="4" placeholder="Deskripsi singkat anggota"></textarea>
              </label>

              <div class="admin-form__actions admin-form__field--full">
                <button class="button button--solid pressable" type="submit" data-admin-submit-label>
                  Tambah Anggota
                </button>
                <button class="button button--ghost pressable" type="button" data-admin-form-reset>
                  Reset Form
                </button>
                <button class="button button--ghost pressable" type="button" data-admin-reset-storage>
                  Kembalikan Data Awal
                </button>
              </div>
              <p class="admin-form__hint admin-form__field--full">
                Perubahan admin disimpan di browser ini lewat local storage.
              </p>
            </form>
          </section>

          <section class="card-surface admin-panel">
            <div class="admin-panel__head">
              <div>
                <p class="eyebrow">Roster</p>
                <h2>Semua anggota aktif.</h2>
              </div>
              <strong data-admin-members-count>0 anggota</strong>
            </div>
            <div class="admin-table-wrap">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Nama</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody data-admin-members-table></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
