<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EXRPLONES Admin | Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/admin.css" />
    <script defer src="../assets/js/members-store.js"></script>
    <script defer src="../assets/js/content-store.js"></script>
    <script defer src="../assets/js/admin.js"></script>
  </head>
  <body data-admin-page="projects">
    <main class="admin-shell">
      <aside class="admin-sidebar card-surface">
        <div>
          <p class="eyebrow">EXRPLONES</p>
          <h2>Panel Admin</h2>
        </div>
        <nav class="admin-sidebar__nav">
          <a class="pressable" href="dashboard.html">Dashboard</a>
          <a class="pressable" href="members.html">Members</a>
          <a class="pressable is-active" href="projects.html">Projects</a>
          <a class="pressable" href="gallery.html">Gallery</a>
          <a class="pressable" href="events.html">Events</a>
          <a class="pressable" href="about.html">About</a>
          <a class="pressable" href="../index.html">Website</a>
        </nav>
        <button class="button button--ghost pressable" type="button" data-admin-logout>
          Logout
        </button>
      </aside>

      <section class="admin-content">
        <header class="admin-header">
          <div>
            <p class="eyebrow">Projects</p>
            <h1>Kelola project EXRPLONES.</h1>
          </div>
          <label class="admin-search">
            <span>Cari project</span>
            <input type="search" placeholder="Ketik judul atau kategori" data-admin-projects-search />
          </label>
        </header>

        <div class="admin-manage-layout">
          <section class="card-surface admin-panel">
            <div class="admin-panel__head">
              <div>
                <p class="eyebrow">Form Project</p>
                <h2>Tambah atau edit project.</h2>
              </div>
            </div>
            <form class="admin-form admin-form--members" data-admin-project-form>
              <input type="hidden" name="item_id" />
              <label class="admin-form__field admin-form__field--full">
                <span>Judul</span>
                <input type="text" name="title" placeholder="Judul project" required />
              </label>
              <label class="admin-form__field">
                <span>Kategori</span>
                <input type="text" name="category" placeholder="Web, App, dll" />
              </label>
              <label class="admin-form__field">
                <span>Status</span>
                <input type="text" name="status" placeholder="Active, Draft, Done" />
              </label>
              <label class="admin-form__field">
                <span>Tahun</span>
                <input type="text" name="year" placeholder="2026" />
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Path gambar</span>
                <input type="text" name="image" placeholder="assets/images/projects/..." />
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Deskripsi singkat</span>
                <textarea name="description" rows="3" placeholder="Ringkasan project"></textarea>
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Summary</span>
                <textarea name="summary" rows="3" placeholder="Intro singkat di detail page"></textarea>
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Overview</span>
                <textarea name="overview" rows="4" placeholder="Penjelasan lengkap project"></textarea>
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Tech stack</span>
                <textarea name="tech" rows="2" placeholder="HTML, CSS, JavaScript"></textarea>
              </label>
              <label class="admin-form__field admin-form__field--full">
                <span>Fitur</span>
                <textarea name="features" rows="3" placeholder="Login, Dashboard, Search"></textarea>
              </label>
              <div class="admin-form__actions admin-form__field--full">
                <button class="button button--solid pressable" type="submit" data-admin-project-submit-label>
                  Tambah Project
                </button>
                <button class="button button--ghost pressable" type="button" data-admin-project-form-reset>
                  Reset Form
                </button>
                <button class="button button--ghost pressable" type="button" data-admin-project-reset-storage>
                  Kembalikan Data Awal
                </button>
              </div>
            </form>
          </section>

          <section class="card-surface admin-panel">
            <div class="admin-panel__head">
              <div>
                <p class="eyebrow">Daftar Project</p>
                <h2>Project yang tampil di website.</h2>
              </div>
              <strong data-admin-projects-count>0 project</strong>
            </div>
            <div class="admin-table-wrap">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Judul</th>
                    <th>Kategori</th>
                    <th>Status</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody data-admin-projects-table></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
