<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EXRPLONES | Members</title>
    <meta
      name="description"
      content="Daftar anggota EXRPLONES dengan render otomatis dari members.json dan modal foto."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/animation.css" />
    <script defer src="assets/js/main.js"></script>
    <script defer src="assets/js/runtime-config.js"></script>
    <script defer src="assets/js/api-client.js"></script>
    <script defer src="assets/js/local-media-store.js"></script>
    <script defer src="assets/js/members-store.js"></script>
    <script defer src="assets/js/modal.js"></script>
    <script defer src="assets/js/members.js"></script>
  </head>
  <body data-page="members">
    <div data-component="navbar"></div>

    <main class="page-main">
      <section class="page-header container" data-reveal>
        <p class="eyebrow">Members Directory</p>
        <h1>Daftar anggota EXRPLONES.</h1>
        <p class="page-header__lead">
          Klik PP untuk zoom, klik nama untuk masuk ke profil, dan pakai pencarian buat cari
          anggota lebih cepat.
        </p>
      </section>

      <section class="container" data-reveal>
        <div class="members-toolbar">
          <label class="members-search card-surface">
            <span class="members-search__label">Cari anggota</span>
            <input
              type="search"
              placeholder="Ketik nama atau username"
              data-members-search
            />
          </label>
          <article class="stat-card card-surface members-toolbar__result">
            <strong data-members-result>0</strong>
            <span>hasil tampil</span>
          </article>
        </div>

        <div class="stat-grid members-stats">
          <article class="stat-card card-surface">
            <strong data-members-count>0</strong>
            <span>anggota ter-render</span>
          </article>
          <article class="stat-card card-surface">
            <strong data-role-count>0</strong>
            <span>role aktif</span>
          </article>
          <article class="stat-card card-surface">
            <strong data-instagram-count>0</strong>
            <span>akun Instagram</span>
          </article>
        </div>
        <div class="chip-row" data-members-roles></div>
      </section>

      <section class="section container">
        <div class="members-list" data-members-grid aria-live="polite"></div>
      </section>
    </main>

    <div data-component="footer"></div>
  </body>
</html>
